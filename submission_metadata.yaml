# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
 Our pipeline utilizes a local-first, four-stage hybrid architecture optimized for CPU constraints.
 Phase 1 profiles raw candidate streams to immediately filter out inactive records (>180 days) and non-responsive applications (<10% rate). 
 Phase 2 executes semantic matching via a fast BM25 pre-filter coupled with a local 'all-MiniLM-L6-v2' Hugging Face text embedding space.
 Phase 3 incorporates behavioral metadata multipliers using recruiter conversion rates.
 Phase 4 runs an algorithmic verification judge to catch keyword-stuffer honeypots by heavily penalizing non-engineering profiles matching trap titles.
 Execution completes globally roughly under 70 seconds.

